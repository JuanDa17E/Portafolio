<nav class="navbar" [class.scrolled]="scrolled">
  <div class="container nav-inner">

    <a class="logo" (click)="scrollTo('inicio')">
      {{ txt.nav.logo.split('.')[0] }}<span class="logo-dot">.</span>{{ txt.nav.logo.split('.')[1] }}
    </a>

    <ul class="nav-links" [class.open]="menuOpen">
      <li *ngFor="let link of txt.nav.links">
        <a (click)="scrollTo(link)" [class.active]="activeLink === link">{{ link }}</a>
      </li>
    </ul>

    <div class="nav-actions">
      <button class="theme-toggle" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Activar modo claro' : 'Activar modo oscuro'">
        <span *ngIf="theme.isDark()">☀️</span>
        <span *ngIf="!theme.isDark()">🌙</span>
      </button>

      <button class="btn-primary" (click)="copyEmail()">
        {{ txt.nav.cta }}
      </button>

      <button class="burger" (click)="toggleMenu()" aria-label="Menú">
        <span [class.open]="menuOpen"></span>
        <span [class.open]="menuOpen"></span>
        <span [class.open]="menuOpen"></span>
      </button>
    </div>

  </div>
</nav>
